{% extends "base.html" %}
{% block title %}{{ t.get("cs.title") }} — {{ t.get("app.name") }}{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{{ t.get("cs.title") }}</h1>
<div class="row">
  <div class="col-lg-6">
    <select name="status" class="form-select w-auto mb-3" id="cs-status"
            hx-get="/curator/change-sets/fragment" hx-target="#change-set-table" hx-trigger="change">
      <option value="">{{ t.get("cs.filter.all") }}</option>
      <option value="DRAFT"{% if list.status == "DRAFT" %} selected{% endif %}>DRAFT</option>
      <option value="READY_FOR_REVIEW"{% if list.status == "READY_FOR_REVIEW" %} selected{% endif %}>READY_FOR_REVIEW</option>
      <option value="UNDER_REVIEW"{% if list.status == "UNDER_REVIEW" %} selected{% endif %}>UNDER_REVIEW</option>
      <option value="APPLIED"{% if list.status == "APPLIED" %} selected{% endif %}>APPLIED</option>
      <option value="DISCARDED"{% if list.status == "DISCARDED" %} selected{% endif %}>DISCARDED</option>
    </select>
    <div id="change-set-table"
         hx-get="/curator/change-sets/fragment"
         hx-trigger="load, change-set-changed from:body"
         hx-include="#cs-status">
      {% include "curator/change-sets/list.html" %}
    </div>
  </div>
  <div class="col-lg-6">
    <div id="change-set-detail"><p class="detail-empty">{{ t.get("cs.select") }}</p></div>
  </div>
</div>
{% endblock %}
