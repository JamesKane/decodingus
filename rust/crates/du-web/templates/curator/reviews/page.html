{% extends "base.html" %}
{% block title %}{{ t.get("rev.title") }} — {{ t.get("app.name") }}{% endblock %}
{% block content %}
<h1 class="h3 mb-1">{{ t.get("rev.title") }}</h1>
<p class="text-muted small mb-3">{{ t.get("rev.intro") }}</p>
<div class="row">
  <div class="col-lg-5">
    <div class="d-flex gap-2 mb-3">
      <select name="status" class="form-select form-select-sm w-auto" id="rev-status"
              hx-get="/curator/reviews/fragment" hx-target="#review-table" hx-trigger="change" hx-include="#rev-category">
        <option value="open"{% if list.status == "open" || list.status == "" %} selected{% endif %}>{{ t.get("rev.filter.open") }}</option>
        <option value="resolved"{% if list.status == "resolved" %} selected{% endif %}>{{ t.get("rev.filter.resolved") }}</option>
        <option value="deferred"{% if list.status == "deferred" %} selected{% endif %}>{{ t.get("rev.filter.deferred") }}</option>
        <option value="all"{% if list.status == "all" %} selected{% endif %}>{{ t.get("rev.filter.all") }}</option>
      </select>
      <select name="category" class="form-select form-select-sm w-auto" id="rev-category"
              hx-get="/curator/reviews/fragment" hx-target="#review-table" hx-trigger="change" hx-include="#rev-status">
        <option value="">{{ t.get("rev.cat.all") }}</option>
        <option value="weak_plurality"{% if list.category == "weak_plurality" %} selected{% endif %}>weak_plurality</option>
        <option value="parent_inconsistent"{% if list.category == "parent_inconsistent" %} selected{% endif %}>parent_inconsistent</option>
        <option value="name_collision"{% if list.category == "name_collision" %} selected{% endif %}>name_collision</option>
        <option value="graft_blocked"{% if list.category == "graft_blocked" %} selected{% endif %}>graft_blocked</option>
      </select>
    </div>
    <div id="review-table"
         hx-get="/curator/reviews/fragment"
         hx-trigger="load, review-changed from:body"
         hx-include="#rev-status, #rev-category">
      {% include "curator/reviews/list.html" %}
    </div>
  </div>
  <div class="col-lg-7">
    <div id="review-detail"><p class="detail-empty">{{ t.get("rev.select") }}</p></div>
  </div>
</div>
{% endblock %}
