{# Fragment: region detail + actions. Target of #region-detail. #}
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <strong>{{ name }}</strong>
    <span class="badge text-bg-secondary">{{ region_type }}</span>
  </div>
  <div class="card-body">
    <h6>{{ t.get("region.field.coordinates") }}</h6>
    <pre class="bg-light p-2 rounded small mb-3"><code>{{ coordinates }}</code></pre>
    <h6>{{ t.get("region.field.properties") }}</h6>
    <pre class="bg-light p-2 rounded small mb-3"><code>{{ properties }}</code></pre>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-primary" hx-get="/curator/regions/{{ id }}/edit" hx-target="#region-detail">{{ t.get("region.edit") }}</button>
      <button class="btn btn-sm btn-outline-danger" hx-delete="/curator/regions/{{ id }}" hx-target="#region-detail"
              hx-confirm="{{ t.get("region.delete.confirm") }}">{{ t.get("region.delete") }}</button>
    </div>
  </div>
</div>
