{% extends "base.html" %}
{% block title %}Variant Browser — Decoding Us{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Variant Browser</h1>
<div class="row">
  <div class="col-lg-7">
    <input type="search" name="query" class="form-control mb-3"
           placeholder="Search by name or alias (e.g. M269, rs9786153)…"
           value="{{ query }}"
           hx-get="/variants/list"
           hx-trigger="input changed delay:300ms, search"
           hx-target="#variants-table"
           hx-indicator="#search-spinner">
    <span id="search-spinner" class="htmx-indicator spinner-border spinner-border-sm"></span>
    <div id="variants-table"
         hx-get="/variants/list?query={{ query }}"
         hx-trigger="load">
    </div>
  </div>
  <div class="col-lg-5">
    <div id="detail-panel">
      <p class="detail-empty">Select a variant to see details.</p>
    </div>
  </div>
</div>
{% endblock %}
