<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Decoding Us{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    body { padding-top: 4.5rem; }
    .detail-empty { color: var(--bs-secondary-color); }
    .tree-node { cursor: pointer; }
  </style>
</head>
<body hx-boost="true">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/">Decoding Us</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/ytree">Y-DNA Tree</a>
        <a class="nav-link" href="/mtree">mtDNA Tree</a>
        <a class="nav-link" href="/variants">Variants</a>
      </div>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
