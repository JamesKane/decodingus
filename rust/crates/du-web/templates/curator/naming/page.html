{% extends "base.html" %}
{% block title %}{{ t.get("nm.title") }} — {{ t.get("app.name") }}{% endblock %}
{% block content %}
<h1 class="h3 mb-1">{{ t.get("nm.title") }}</h1>
<p class="text-muted small mb-3">{{ t.get("nm.intro") }}</p>
<div class="row">
  <div class="col-lg-6">
    <select name="mode" class="form-select form-select-sm w-auto mb-3" id="nm-mode"
            hx-get="/curator/naming/fragment" hx-target="#naming-table" hx-trigger="change">
      <option value="needs_name"{% if list.mode == "needs_name" %} selected{% endif %}>{{ t.get("nm.mode.needs") }}</option>
      <option value="PENDING_REVIEW"{% if list.mode == "PENDING_REVIEW" %} selected{% endif %}>{{ t.get("nm.mode.pending") }}</option>
      <option value="NAMED"{% if list.mode == "NAMED" %} selected{% endif %}>{{ t.get("nm.mode.named") }}</option>
      <option value="UNNAMED"{% if list.mode == "UNNAMED" %} selected{% endif %}>{{ t.get("nm.mode.backlog") }}</option>
      <option value="all"{% if list.mode == "all" %} selected{% endif %}>{{ t.get("nm.mode.all") }}</option>
    </select>
    <div id="naming-table"
         hx-get="/curator/naming/fragment"
         hx-trigger="load, naming-changed from:body"
         hx-include="#nm-mode">
      {% include "curator/naming/list.html" %}
    </div>
  </div>
  <div class="col-lg-6">
    <div id="naming-detail"><p class="detail-empty">{{ t.get("nm.select") }}</p></div>
  </div>
</div>
{% endblock %}
