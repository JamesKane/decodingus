{% extends "base.html" %}
{% block title %}{{ t.get("map.title") }} — {{ t.get("app.name") }}{% endblock %}
{% block head %}
<link rel="stylesheet" href="/assets/vendor/leaflet.css">
<script src="/assets/vendor/leaflet.js"></script>
<script defer src="/assets/map.js"></script>
<style>#map { height: 70vh; border-radius: .375rem; }</style>
{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">{{ t.get("map.title") }}</h1>
  <small class="text-muted"><span id="map-count">…</span> {{ t.get("map.samples") }}</small>
</div>
<div id="map" data-geo="/biosamples/geo-data">{{ t.get("map.loading") }}</div>
{% endblock %}
